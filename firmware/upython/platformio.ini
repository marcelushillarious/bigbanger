[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
upload_port = /dev/cu.usbmodem56470102231
upload_speed = 115200
monitor_port = /dev/cu.usbmodem56470102231

; This PlatformIO project is configured for ESP32 and provides a VS Code
; project shell. The actual device code lives in Python under the firmware/upython
; folder and can be uploaded with ampy or rshell after flashing MicroPython.
